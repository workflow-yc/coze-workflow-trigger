name: Coze Workflow Trigger

on:
  schedule:
    # 改为每小时的第 17 分钟执行，避开整点拥堵
    - cron: '17 * * * *'
  
  # 允许在 GitHub 网页端手动触发
  workflow_dispatch:
    inputs:
      custom_params:
        description: '自定义JSON参数 (可选，默认为空对象 {})'
        required: false
        default: '{}'

env:
  TZ: Asia/Shanghai
  COZE_API_URL: "https://api.coze.cn/v1/workflow/run"
  WORKFLOW_ID: ${{ vars.WORKFLOW_ID }}

jobs:
  trigger_coze:
    runs-on: ubuntu-latest
    steps:
    - name: 打印当前时间 (验证上海时区)
      run: date
      
    - name: 设置请求参数
      id: set_params
      run: |
        # 如果是定时自动触发，custom_params 会为空，这里强制赋予默认值 '{}'
        PARAMS="${{ github.event.inputs.custom_params }}"
        if [ -z "$PARAMS" ]; then
          PARAMS="{}"
        fi
        echo "PARAMS=$PARAMS" >> $GITHUB_OUTPUT
        echo "当前使用的 parameters: $PARAMS"

    - name: 触发 Coze 工作流：获取信息
     run: |
        curl -X POST "${{ env.COZE_API_URL }}" \
        -H "Authorization: Bearer ${{ secrets.COZE_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "workflow_id": "${{ env.WORKFLOW_ID_1 }}",
          "parameters": "{}"
        }'

    - name: 强制等待 5 分钟，等第一个工作流完成
      run: |
        echo "第一个工作流已触发，开始等待 5 分钟 (300秒)..."
        sleep 300
        echo "等待结束！"

    - name: 触发 Coze 工作流：信息分析
      run: |
        curl -X POST "${{ env.COZE_API_URL }}" \
        -H "Authorization: Bearer ${{ secrets.COZE_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "workflow_id": "${{ env.WORKFLOW_ID_2 }}", 
          "parameters": "{}"
        }'
        
    - name: 记录执行结果
      run: |
        echo "Coze 工作流触发请求已发送！"
        echo "执行时间: $(date +'%Y-%m-%d %H:%M:%S')"
        echo "工作流 ID: ${{ env.WORKFLOW_ID }}"
