name: Coze Workflow Trigger

on:
  schedule:
    # 北京时间8:00执行(UTC+8)
    - cron: '0 0 * * *'
    
    # 每小时执行一次
    - cron: '0 * * * *'
  
  # 允许手动触发
  workflow_dispatch:
    inputs:
      custom_params:
        description: '自定义JSON参数(可选)'
        required: false
        default: '{}'

env:
  TZ: Asia/Shanghai  # 设置时区为上海
  COZE_API_URL: "https://api.coze.cn/v1/workflow/run"
  WORKFLOW_ID: ${{ vars.WORKFLOW_ID }}  # 从Variables读取

jobs:
  trigger_coze:
    runs-on: ubuntu-latest
    steps:
    - name: 显示当前时间(用于验证时区)
      run: date
      
    - name: 设置参数
      id: set_params
      run: |
        echo "PARAMS=${{ github.event.inputs.custom_params || '{}' }}" >> $GITHUB_OUTPUT
        echo "使用参数: ${{ github.event.inputs.custom_params || '{}' }}"

    - name: 触发Coze工作流
      run: |
        curl -X POST "${{ env.CHANGE_COZE_API_URL }}" \
        -H "Authorization: Bearer ${{ secrets.CHANGE_COZE_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "workflow_id": "${{ env.WORKFLOW_ID }}",
          "parameters": ${{ steps.set_params.outputs.PARAMS }}
        }'
      
    - name: 记录执行结果
      run: |
        echo "Coze工作流触发时间: $(date +'%Y-%m-%d %H:%M:%S')"
        echo "工作流ID: ${{ env.WORKFLOW_ID }}"
