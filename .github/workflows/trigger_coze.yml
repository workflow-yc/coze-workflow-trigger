name: Coze Workflow Trigger

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点(北京时间8点)
    - cron: '0 * * * *'  # 每小时
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  COZE_API_URL: https://api.coze.cn/v1/workflow/run

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
    - name: Trigger Coze
      run: |
        curl -X POST "${{ env.CHANGE_COZE_API_URL }}" \
        -H "Authorization: Bearer ${{ secrets.CHANGE_COZE_API_KEY }}" \
        -H "Content-Type: application/json" \
        -d '{
          "workflow_id": "${{ vars.WORKFLOW_ID }}",
          "parameters": {}
        }'
